<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeuomorphic Vintage Radio</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

    <!-- Ambient wall glow that flickers dynamically -->
    <div id="ambient-spotlight"></div>
    
    <!-- Realistic table surface horizon -->
    <div class="wooden-desk"></div>

    <div class="radio-container">
        
        <!-- Beautiful Decorative Grill -->
        <div class="speaker-grill"></div>
        
        <!-- Magic Eye Tube Indicator -->
        <div class="magic-eye-container" id="magic-eye">
            <div class="magic-eye-glass">
                <div class="magic-eye-phosphor"></div>
                <div class="magic-eye-shadow" id="magic-eye-shadow"></div>
                <div class="magic-eye-center"></div>
            </div>
        </div>
        
        <!-- Turning Dial Core -->
        <div class="dial-section">
            <div class="dial-wrapper">
                <div id="css-dial">
                    <div class="dial-ridge"></div>
                    <div class="dial-center">
                        <div class="dial-pointer"></div>
                    </div>
                </div>
                <!-- Native access layer -->
                <input type="range" id="tuning-knob" min="550" max="2500" value="550">
            </div>
        </div>

        <div class="metadata-container">
            <div id="metadata-ribbon" class="dymo-label off">POWER OFF</div>
        </div>

        <div class="frequency-indicator">
            <button class="fine-tune-btn" id="tune-down">◀</button>
            <div class="freq-text-group">
                <span id="freq-readout">550</span> <span class="unit">kHz</span>
            </div>
            <button class="fine-tune-btn" id="tune-up">▶</button>
        </div>

        <!-- Utility row -->
        <div class="lower-controls">
            
            <div class="left-controls">
                <div class="volume-section">
                    <div class="vol-dial-wrapper">
                        <div id="css-vol-dial">
                            <div class="vol-pointer"></div>
                        </div>
                        <input type="range" id="volume-knob" min="0" max="1" step="0.001" value="0.33">
                    </div>
                </div>

                <div class="power-section">
                    <div class="switch-label">I / O</div>
                    <div class="power-switch off" id="power-switch">
                        <div class="switch-button"></div>
                    </div>
                </div>
            </div>

            <div class="presets-section">
                <div class="presets">
                    <button class="preset-btn" data-slot="1">1</button>
                    <button class="preset-btn" data-slot="2">2</button>
                    <button class="preset-btn" data-slot="3">3</button>
                    <button class="preset-btn" data-slot="4">4</button>
                    <button class="preset-btn" data-slot="5">5</button>
                    <button class="action-btn clear-btn" id="clear-presets">CLR</button>
                </div>
                <div class="preset-hint">Hold to Save</div>
            </div>

            <!-- Sleep Timer Section -->
            <div class="sleep-section">
                <div class="sleep-label" id="sleep-label">SLEEP: OFF</div>
                <div class="sleep-knob sleep-pos-0" id="sleep-knob">
                    <div class="sleep-indicator"></div>
                </div>
            </div>

        </div>

        <audio id="static-noise" loop src="static.mp3"></audio>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
