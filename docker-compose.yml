version: '3.8'

services:
  api_backend:
    build: .
    container_name: vintage-radio-api
    ports:
      - "3000:3000"
    volumes:
      - ./stations:/app/stations
    restart: always

  web_frontend:
    image: nginx:alpine
    container_name: vintage-radio-web
    ports:
      - "8080:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
    restart: always

  streaming_backend:
    build: .
    container_name: vintage-radio-streaming
    command: node streaming-server.js
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
    restart: always
